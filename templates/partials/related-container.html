{# Prev/next sibling links for a single entry (blog post, release).
   Uses page.lower / page.higher provided by Zola. #}
<div class="related-container">
  {% if page.lower %}
  <a href="{{ page.lower.path }}" class="btn btn-secondary link link--previous">
    <span>←</span>
    <span class="link__title">{{ page.lower.title }}</span>
  </a>
  {% endif %}

  {% if page.higher %}
  <a href="{{ page.higher.path }}" class="btn btn-secondary link link--next">
    <span class="link__title">{{ page.higher.title }}</span>
    <span>→</span>
  </a>
  {% endif %}
</div>
