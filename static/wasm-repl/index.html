<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phel Browser REPL</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1f2937;
      --muted: #6b7280;
      --border: rgba(0, 0, 0, 0.12);
      --accent: #9333ea;
      --accent-strong: #7e22ce;
      --panel: #f8fafc;
      --code-bg: #f8fafc;
      --error: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --fg: #f1f5f9;
        --muted: #94a3b8;
        --border: rgba(255, 255, 255, 0.12);
        --panel: #111827;
        --code-bg: #0b1220;
        --error: #f87171;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex: 0 0 auto;
    }
    .toolbar button {
      font: inherit;
      padding: 0.4rem 0.9rem;
      border-radius: 0.375rem;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-weight: 600;
    }
    .toolbar button:hover:not(:disabled),
    .toolbar button:focus-visible:not(:disabled) {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }
    .toolbar button:disabled { opacity: 0.6; cursor: progress; }
    .toolbar button.secondary {
      background: transparent;
      color: var(--accent);
    }
    .toolbar button.secondary:hover:not(:disabled),
    .toolbar button.secondary:focus-visible:not(:disabled) {
      background: var(--accent);
      color: #ffffff;
    }
    .toolbar button.secondary:disabled { cursor: not-allowed; }
    .toolbar select {
      font: inherit;
      padding: 0.4rem 0.6rem;
      border-radius: 0.375rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
    }
    .toolbar .status { font-size: 0.85rem; color: var(--muted); }
    .dlbar {
      width: 160px;
      height: 0.65rem;
      flex: 0 0 auto;
      accent-color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      overflow: hidden;
      background: var(--panel);
    }
    .dlbar[hidden] { display: none; }
    .dlbar::-webkit-progress-bar { background: var(--panel); }
    .dlbar::-webkit-progress-value { background: var(--accent); }
    .dlbar::-moz-progress-bar { background: var(--accent); }
    .panes {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }
    @media (max-width: 720px) {
      .panes { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }
    #editor, #output {
      width: 100%;
      height: 100%;
      padding: 0.75rem 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      line-height: 1.55;
      background: var(--code-bg);
      color: var(--fg);
      border: 0;
      overflow: auto;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    #editor {
      border-right: 1px solid var(--border);
      white-space: pre;
    }
    @media (max-width: 720px) {
      #editor { border-right: 0; border-bottom: 1px solid var(--border); }
    }
    #editor:focus { box-shadow: inset 0 0 0 2px var(--accent); }
    .outpane {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: var(--bg);
    }
    .outbar {
      position: absolute;
      top: 0.4rem;
      right: 0.6rem;
      display: flex;
      gap: 0.35rem;
      z-index: 1;
    }
    .outbar button {
      font: inherit;
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 0.3rem;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      opacity: 0.85;
    }
    .outbar button:hover { color: var(--fg); opacity: 1; }
    #output {
      background: var(--bg);
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }
    #output.muted { color: var(--muted); }
    #output.error { color: var(--error); }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <button id="run" disabled>Loading runtime…</button>
      <button id="share" class="secondary" type="button" title="Copy a shareable link to this code">Share</button>
      <select id="examples" title="Load an example snippet">
        <option value="" selected>Examples…</option>
        <option value="sequences">Sequences</option>
        <option value="destructuring">Destructuring</option>
        <option value="macros">Macros</option>
        <option value="interop">PHP interop</option>
        <option value="data">Data structures</option>
      </select>
      <progress id="dlbar" class="dlbar" max="100" value="0" hidden></progress>
      <span class="status" id="status">Downloading Phel WASM bundle (~80 MB, cached after first load)</span>
    </div>
    <div class="panes">
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">;; Welcome to the Phel browser REPL
;; Edit and click Run to evaluate

(ns test)

(def my-name "world")

(defn greet [name]
  (str "Hello, " name "!"))

(print (greet my-name))
</textarea>
      <div class="outpane">
        <div class="outbar">
          <button id="copyOut" type="button" title="Copy output">Copy</button>
          <button id="clearOut" type="button" title="Clear output">Clear</button>
        </div>
        <pre id="output" class="muted">Output appears here.</pre>
      </div>
    </div>
  </div>

  <script type="module">
    import php from "./build/php-web.mjs";

    const buffer = [];
    const errBuffer = [];
    let isRunning = false;
    const editorEl = document.getElementById('editor');
    const outputEl = document.getElementById('output');
    const runBtn = document.getElementById('run');
    const shareBtn = document.getElementById('share');
    const copyOutBtn = document.getElementById('copyOut');
    const clearOutBtn = document.getElementById('clearOut');
    const statusEl = document.getElementById('status');

    const isDeprecatedNotice = (s) => /^Deprecated:.*\bon line \d+\s*$/.test(s);

    // --- Persistence + shareable links ---------------------------------------
    // Editor content survives reloads (localStorage) and can be shared via a
    // URL hash (#code=<base64>). A hash, when present, wins over local storage
    // so a shared link always shows the sender's code.
    const STORAGE_KEY = 'phel-repl-code';
    const encodeCode = (s) => btoa(unescape(encodeURIComponent(s)));
    const decodeCode = (s) => decodeURIComponent(escape(atob(s)));

    function restoreCode() {
      const hashMatch = /[#&]code=([^&]+)/.exec(location.hash);
      if (hashMatch) {
        try { editorEl.value = decodeCode(decodeURIComponent(hashMatch[1])); return; }
        catch (_) { /* fall through to storage/default */ }
      }
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved != null) editorEl.value = saved;
      } catch (_) {}
    }
    restoreCode();

    editorEl.addEventListener('input', () => {
      try { localStorage.setItem(STORAGE_KEY, editorEl.value); } catch (_) {}
    });

    let shareResetTimer;
    shareBtn.addEventListener('click', async () => {
      const url = location.origin + location.pathname + '#code=' + encodeURIComponent(encodeCode(editorEl.value));
      const original = shareBtn.textContent;
      try {
        await navigator.clipboard.writeText(url);
        shareBtn.textContent = 'Copied!';
      } catch (_) {
        location.hash = 'code=' + encodeURIComponent(encodeCode(editorEl.value));
        shareBtn.textContent = 'Link in URL';
      }
      clearTimeout(shareResetTimer);
      shareResetTimer = setTimeout(() => { shareBtn.textContent = original; }, 1500);
    });

    // --- Example snippets ----------------------------------------------------
    // Each snippet is self-contained and verified against the Phel runtime.
    const EXAMPLES = {
      sequences: `(ns repl\\sequences)

# map, filter and reduce over a vector
(def nums [1 2 3 4 5 6])

(println "doubled:" (map |(* 2 $) nums))
(println "evens:" (filter even? nums))
(println "sum:" (reduce + 0 nums))
`,
      destructuring: `(ns repl\\destructuring)

# Destructure vectors and maps in let bindings
(let [[a b & rest] [1 2 3 4 5]
      {:name name :role role} {:name "Ada" :role "pioneer"}]
  (println a b rest)
  (println name "the" role))
`,
      macros: `(ns repl\\macros)

# Define a macro: unless is the inverse of if
(defmacro unless [test & body]
  \`(if ,test nil (do ,@body)))

(unless false
  (println "this runs because the test is false"))
`,
      interop: `(ns repl\\interop)

# Call PHP functions directly via the php/ prefix
(println (php/strtoupper "phel runs on php"))
(println (php/array_sum (php/array 1 2 3 4)))
`,
      data: `(ns repl\\data)

# Maps, keywords and threading
(def user {:name "Grace" :langs ["phel" "php"]})

(println (get user :name))
(println (-> user :langs count))
`,
    };

    const examplesEl = document.getElementById('examples');
    examplesEl.addEventListener('change', () => {
      const code = EXAMPLES[examplesEl.value];
      if (code) {
        editorEl.value = code;
        try { localStorage.setItem(STORAGE_KEY, code); } catch (_) {}
      }
      examplesEl.value = '';
    });

    // --- Download progress for the ~80 MB runtime bundle ---------------------
    // Emscripten fetches the runtime via fetch() or XHR with no built-in UI, so
    // we wrap both transports to surface real byte progress instead of a static
    // "Loading…" label. Only sizable downloads are tracked; the small .wasm is
    // left untouched so WebAssembly.instantiateStreaming keeps working.
    const dlbar = document.getElementById('dlbar');
    const BIG_DOWNLOAD = 4 * 1024 * 1024;
    const toMB = (b) => (b / (1024 * 1024)).toFixed(1);

    function reportProgress(loaded, total) {
      if (total) {
        const pct = Math.min(100, Math.round((loaded / total) * 100));
        dlbar.hidden = false;
        dlbar.value = pct;
        if (pct >= 100) {
          dlbar.hidden = true;
          statusEl.textContent = 'Initializing runtime…';
        } else {
          statusEl.textContent = `Downloading Phel runtime: ${toMB(loaded)} / ${toMB(total)} MB (${pct}%)`;
        }
      } else {
        dlbar.hidden = true;
        statusEl.textContent = `Downloading Phel runtime: ${toMB(loaded)} MB…`;
      }
    }

    const _fetch = window.fetch.bind(window);
    window.fetch = async (...args) => {
      const url = (typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url)) || '';
      const res = await _fetch(...args);
      // leave .wasm to instantiateStreaming, only meter large data downloads
      if (/\.wasm(\?|$)/.test(url) || !res.body || !res.ok) return res;
      const total = Number(res.headers.get('content-length')) || 0;
      if (total && total < BIG_DOWNLOAD) return res;
      const reader = res.body.getReader();
      let loaded = 0;
      const stream = new ReadableStream({
        async pull(controller) {
          const { done, value } = await reader.read();
          if (done) { controller.close(); return; }
          loaded += value.byteLength;
          if (total >= BIG_DOWNLOAD || (!total && loaded >= BIG_DOWNLOAD)) reportProgress(loaded, total);
          controller.enqueue(value);
        },
        cancel(reason) { return reader.cancel(reason); },
      });
      return new Response(stream, { status: res.status, statusText: res.statusText, headers: res.headers });
    };

    const _xhrOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function (...openArgs) {
      this.addEventListener('progress', (e) => {
        if (e.lengthComputable && e.total >= BIG_DOWNLOAD) reportProgress(e.loaded, e.total);
      });
      return _xhrOpen.apply(this, openArgs);
    };

    function setLoading(loading) {
      runBtn.disabled = loading;
      runBtn.textContent = loading ? 'Running…' : 'Run';
    }

    // kind: 'normal' (default), 'muted' (placeholder/info), 'error' (red)
    function showResult(text, kind) {
      outputEl.textContent = text;
      outputEl.classList.toggle('muted', kind === 'muted');
      outputEl.classList.toggle('error', kind === 'error');
    }

    let copyResetTimer;
    copyOutBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(outputEl.textContent || '');
        copyOutBtn.textContent = 'Copied!';
        clearTimeout(copyResetTimer);
        copyResetTimer = setTimeout(() => { copyOutBtn.textContent = 'Copy'; }, 1500);
      } catch (_) {}
    });

    clearOutBtn.addEventListener('click', () => {
      showResult('Output appears here.', 'muted');
    });

    let runtime;
    try {
      runtime = await php({
        print(data) { buffer.push(data); },
        printErr(data) { buffer.push(data); errBuffer.push(data); console.warn('[phel-wasm:stderr]', data); },
      });
    } catch (e) {
      console.error('[phel-wasm] runtime init failed:', e);
      dlbar.hidden = true;
      statusEl.textContent = 'Failed to load runtime. Check console.';
      showResult(String(e), 'error');
    }

    if (runtime) {
      const { ccall, FS } = runtime;

      dlbar.hidden = true;
      runBtn.disabled = false;
      runBtn.textContent = 'Run';
      statusEl.textContent = 'Ready. Edit code on the left, click Run.';

      runBtn.addEventListener('click', () => {
        try {
          FS.writeFile('/app/src/test.phel', editorEl.value);
          buffer.length = 0;
          errBuffer.length = 0;
          isRunning = true;
          showResult('', 'normal');
          setLoading(true);

          const ret = ccall('phpw_with_args', 'string', ['string', 'string', 'string'], [
            '/app/src/wasm-entry/entry-point.php',
          ]);

          const hasError = errBuffer.some((line) => !isDeprecatedNotice(line) && line.trim().length > 0);
          const kind = hasError ? 'error' : 'normal';
          const filtered = buffer.filter((line) => !isDeprecatedNotice(line));
          const text = filtered.join('');
          if (text.trim().length > 0) {
            showResult(text, kind);
          } else if (buffer.length > 0) {
            showResult(buffer.join(''), kind);
          } else if (typeof ret === 'string' && ret.length > 0) {
            showResult(ret, kind);
          } else {
            showResult('(no output: buffer empty, ret=' + JSON.stringify(ret) + ')', 'muted');
          }
          console.debug('[phel-wasm] buffer:', buffer, 'ret:', ret);
        } catch (e) {
          console.error('[phel-wasm] run failed:', e);
          showResult(String(e), 'error');
        } finally {
          isRunning = false;
          setLoading(false);
        }
      });

      editorEl.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = editorEl.selectionStart;
          const end = editorEl.selectionEnd;
          editorEl.value = editorEl.value.slice(0, start) + '  ' + editorEl.value.slice(end);
          editorEl.selectionStart = editorEl.selectionEnd = start + 2;
        } else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
          e.preventDefault();
          runBtn.click();
        }
      });
    }
  </script>
</body>
</html>
