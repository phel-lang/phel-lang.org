on:
  push:
    branches:
      - master
  workflow_dispatch:

# Serialize deploys: the FTP mirror is last-writer-wins, so parallel runs from
# back-to-back merges can clobber newer content. Queue runs instead of cancelling
# so every push still ships, in order.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy website to server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP with tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install PHP dependencies
        run: composer install

      - name: Generate API Documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer build

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build CSS for production
        run: npm run build-css-prod

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C /usr/local/bin

      - name: Fetch WASM REPL bundle
        run: ./scripts/fetch-wasm-repl.sh

      - name: Build site
        run: zola build

      - name: Deploy via LFTP
        env:
          FTP_USERNAME: ${{ secrets.ftp_username }}
          FTP_PASSWORD: ${{ secrets.ftp_password }}
          FTP_HOST: ${{ secrets.ftp_host }}
          FTP_TARGET: ${{ secrets.ftp_remote_target_dir }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y lftp

          # Run the mirror. Don't let set -e abort before the diagnostics below run;
          # capture lftp's real exit code via PIPESTATUS instead.
          set +e
          lftp -c "
            set cmd:fail-exit yes;
            set net:max-retries 3;
            set net:timeout 30;
            set mirror:parallel-transfer-count 1;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_HOST\";
            mirror --reverse --delete --depth-first --overwrite --verbose public/ \"$FTP_TARGET\";
          " 2>&1 | tee lftp.log
          lftp_rc=${PIPESTATUS[0]}
          set -e

          # lftp's mirror can report per-file failures (e.g. 550 - cannot create
          # directory, usually disk quota / permissions on the server) without a
          # non-zero exit. Treat any server 5xx error as a hard, loud failure so a
          # partial deploy never passes silently.
          if grep -E "Access failed|^(mkdir|chmod|put|get): |[Ff]atal error|55[0-9]" lftp.log; then
            echo "::error::LFTP deploy reported server errors (5xx). Likely disk quota or write permissions on the FTP host. Deploy is incomplete - failing the job."
            exit 1
          fi

          if [ "$lftp_rc" -ne 0 ]; then
            echo "::error::LFTP exited with code $lftp_rc. Deploy failed."
            exit 1
          fi
